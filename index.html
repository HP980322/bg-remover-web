<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BG Remover</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d12;color:#e2e2e8;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem 4rem}

    h1{font-size:2rem;font-weight:700;text-align:center;margin-bottom:.3rem}
    h1 span{color:#7c6af7}
    .sub{color:#777;font-size:.9rem;text-align:center;margin-bottom:.6rem}
    .badge{display:inline-block;background:#1a1a2e;border:1px solid #3a2f5a;border-radius:999px;
      padding:.22rem .85rem;font-size:.73rem;color:#a89fff;margin-bottom:2rem}

    .card{width:100%;max-width:540px;background:#15151e;border:1px solid #2a2a3a;
      border-radius:18px;padding:1.75rem}

    /* ── Upload area — a real <label> so click works natively ── */
    .upload-area{display:block;border:2px dashed #333;border-radius:12px;padding:2.5rem 1rem;
      text-align:center;cursor:pointer;transition:border-color .15s,background .15s;
      background:#0d0d12;user-select:none}
    .upload-area:hover,.upload-area.over{border-color:#7c6af7;background:#0e0c1c}
    .upload-area .icon{font-size:2rem;display:block;margin-bottom:.6rem}
    .upload-area strong{display:block;font-size:.92rem;color:#d0d0e0;margin-bottom:.25rem}
    .upload-area small{font-size:.76rem;color:#666}

    /* hide the actual input visually but keep it functional */
    #pick{position:absolute;left:-9999px;opacity:0}

    .or{display:flex;align-items:center;gap:8px;margin:.9rem 0}
    .or hr{flex:1;border:none;border-top:1px solid #222}
    .or span{font-size:.72rem;color:#444}

    /* second label/button */
    .btn-pick{display:block;width:100%;padding:.7rem;background:#1c1c28;color:#bbb;
      border:1px solid #2a2a3a;border-radius:10px;font-size:.88rem;cursor:pointer;
      text-align:center;transition:background .15s,border-color .15s;user-select:none}
    .btn-pick:hover{background:#22223a;border-color:#7c6af7;color:#fff}

    /* selected file */
    #fileRow{display:none;align-items:center;gap:10px;background:#1c1c28;
      border:1px solid #2a2a3a;border-radius:10px;padding:.6rem 1rem;margin-top:.85rem}
    #fileRow .name{flex:1;font-size:.82rem;color:#d0d0e0;overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap}
    #fileRow .size{font-size:.72rem;color:#666;flex-shrink:0}
    #clearBtn{background:none;border:none;color:#555;font-size:15px;cursor:pointer;padding:4px}
    #clearBtn:hover{color:#e07070}

    /* go button */
    #goBtn{display:none;width:100%;padding:.78rem;background:#2d9e6b;color:#fff;
      border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;
      margin-top:.85rem;transition:background .15s}
    #goBtn:hover{background:#1f7a50}
    #goBtn:disabled{background:#1a5a3e;color:#556;cursor:not-allowed}

    /* progress */
    #progWrap{display:none;background:#0d0d12;border-radius:6px;height:7px;overflow:hidden;margin-top:.85rem}
    #progBar{height:100%;width:0%;background:#7c6af7;transition:width .35s}
    #statusMsg{margin-top:.65rem;font-size:.8rem;color:#9d8fff;text-align:center;min-height:1.1rem}
    #errMsg{display:none;background:#1f0f14;border:1px solid #6b2030;border-radius:10px;
      padding:.7rem 1rem;margin-top:.85rem;font-size:.8rem;color:#e08090;line-height:1.6}

    .badges{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:1.1rem}
    .pill{font-size:.67rem;padding:2px 9px;border-radius:999px;border:1px solid #2a2a3a;
      color:#444;background:#0d0d14}

    /* result */
    #resultBox{display:none;margin-top:1.5rem;width:100%;max-width:540px;
      background:#15151e;border:1px solid #2a2a3a;border-radius:18px;
      padding:1.25rem;text-align:center}
    #resultBox p{font-size:.8rem;color:#666;margin-bottom:.75rem}
    #outCanvas{max-width:100%;border-radius:10px;border:1px solid #2a2a3a;
      background:repeating-conic-gradient(#1c1c1c 0% 25%,#111 0% 50%) 0 0/14px 14px}
    #dlBtn{display:inline-block;margin-top:.85rem;padding:.58rem 1.8rem;
      background:#2d9e6b;color:#fff;border:none;border-radius:8px;
      font-size:.88rem;font-weight:700;cursor:pointer;transition:background .15s}
    #dlBtn:hover{background:#1f7a50}

    footer{margin-top:2.5rem;font-size:.72rem;color:#444;text-align:center;line-height:1.8}
    footer a{color:#444}
  </style>
</head>
<body>

<h1>&#127924; BG <span>Remover</span></h1>
<p class="sub">Remove image backgrounds — free, no sign-up, runs in your browser</p>
<span class="badge">&#10003; Free &nbsp; &#10003; No sign-up &nbsp; &#10003; Private &nbsp; &#10003; Unlimited</span>

<div class="card">

  <!-- The input sits outside the label so two labels can share the same for= -->
  <input type="file" id="pick" accept="image/png,image/jpeg,image/webp,image/bmp,image/gif">

  <!-- Clicking this label natively opens the file picker — zero JS needed -->
  <label class="upload-area" for="pick" id="dropArea">
    <span class="icon">&#128247;</span>
    <strong>Drop image here or click to browse</strong>
    <small>PNG &bull; JPG &bull; WEBP &bull; BMP</small>
  </label>

  <div class="or"><hr><span>or</span><hr></div>

  <!-- Second label also opens picker natively -->
  <label class="btn-pick" for="pick">&#128193; Choose image file</label>

  <div id="fileRow">
    <span style="font-size:18px">&#128444;</span>
    <span class="name" id="fileName"></span>
    <span class="size" id="fileSize"></span>
    <button id="clearBtn" type="button">&#10005;</button>
  </div>

  <button id="goBtn" type="button">&#10024; Remove Background</button>

  <div id="progWrap"><div id="progBar"></div></div>
  <p id="statusMsg"></p>
  <div id="errMsg"></div>

  <div class="badges">
    <span class="pill">PNG out</span>
    <span class="pill">Unlimited</span>
    <span class="pill">No upload</span>
    <span class="pill">100% private</span>
  </div>
</div>

<div id="resultBox">
  <p>&#9989; Done! Background removed.</p>
  <canvas id="outCanvas"></canvas><br>
  <button id="dlBtn" type="button">&#8659; Download PNG</button>
</div>

<footer>
  Runs entirely in your browser &mdash; images never leave your device &bull;
  <a href="https://github.com/HP980322/bg-remover" target="_blank">GitHub</a>
</footer>

<!-- NO type="module", NO external imports that might be blocked -->
<script>
(function() {
  'use strict';

  var pickEl    = document.getElementById('pick');
  var dropArea  = document.getElementById('dropArea');
  var fileRow   = document.getElementById('fileRow');
  var fileName  = document.getElementById('fileName');
  var fileSize  = document.getElementById('fileSize');
  var clearBtn  = document.getElementById('clearBtn');
  var goBtn     = document.getElementById('goBtn');
  var progWrap  = document.getElementById('progWrap');
  var progBar   = document.getElementById('progBar');
  var statusMsg = document.getElementById('statusMsg');
  var errMsg    = document.getElementById('errMsg');
  var resultBox = document.getElementById('resultBox');
  var outCanvas = document.getElementById('outCanvas');
  var dlBtn     = document.getElementById('dlBtn');

  var currentFile = null;

  // ── file input change ──────────────────────────────────────────────────────
  pickEl.addEventListener('change', function() {
    if (pickEl.files && pickEl.files[0]) setFile(pickEl.files[0]);
  });

  // ── drag and drop ──────────────────────────────────────────────────────────
  dropArea.addEventListener('dragover', function(e) {
    e.preventDefault(); dropArea.classList.add('over');
  });
  dropArea.addEventListener('dragleave', function() {
    dropArea.classList.remove('over');
  });
  dropArea.addEventListener('drop', function(e) {
    e.preventDefault(); dropArea.classList.remove('over');
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) setFile(f);
  });

  function setFile(f) {
    currentFile = f;
    fileName.textContent = f.name;
    fileSize.textContent = (f.size / 1048576).toFixed(2) + ' MB';
    fileRow.style.display  = 'flex';
    goBtn.style.display    = 'block';
    resultBox.style.display = 'none';
    errMsg.style.display    = 'none';
    statusMsg.textContent   = '';
    progBar.style.width     = '0%';
    progWrap.style.display  = 'none';
  }

  clearBtn.addEventListener('click', function() {
    currentFile = null; pickEl.value = '';
    fileRow.style.display   = 'none';
    goBtn.style.display     = 'none';
    resultBox.style.display = 'none';
    errMsg.style.display    = 'none';
    statusMsg.textContent   = '';
  });

  // ── main: remove background ────────────────────────────────────────────────
  goBtn.addEventListener('click', function() {
    if (!currentFile) return;

    goBtn.disabled        = true;
    goBtn.textContent     = 'Processing…';
    errMsg.style.display  = 'none';
    resultBox.style.display = 'none';
    progWrap.style.display = 'block';
    setProgress(5, 'Reading image…');

    var reader = new FileReader();
    reader.onerror = function() { showError('Could not read file.'); };
    reader.onload = function(e) {
      var img = new Image();
      img.onerror = function() { showError('Could not load image.'); };
      img.onload = function() {
        setProgress(20, 'Image loaded — processing…');
        // Use setTimeout so the UI updates before the heavy work
        setTimeout(function() { processImage(img); }, 30);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(currentFile);
  });

  function processImage(img) {
    try {
      var w = img.naturalWidth;
      var h = img.naturalHeight;

      // Source canvas — draw original image
      var src = document.createElement('canvas');
      src.width = w; src.height = h;
      var sCtx = src.getContext('2d');
      sCtx.drawImage(img, 0, 0);
      var data = sCtx.getImageData(0, 0, w, h);
      var px = data.data; // RGBA flat array

      setProgress(40, 'Detecting background…');

      // ── Background detection ──────────────────────────────────────────────
      // Sample the four corners to estimate background colour
      function getRGBA(x, y) {
        var i = (y * w + x) * 4;
        return [px[i], px[i+1], px[i+2], px[i+3]];
      }
      var corners = [
        getRGBA(0, 0), getRGBA(w-1, 0),
        getRGBA(0, h-1), getRGBA(w-1, h-1),
        getRGBA(Math.floor(w/2), 0), getRGBA(Math.floor(w/2), h-1),
        getRGBA(0, Math.floor(h/2)), getRGBA(w-1, Math.floor(h/2))
      ];
      // Average background colour
      var bgR = 0, bgG = 0, bgB = 0;
      for (var k = 0; k < corners.length; k++) {
        bgR += corners[k][0]; bgG += corners[k][1]; bgB += corners[k][2];
      }
      bgR = Math.round(bgR / corners.length);
      bgG = Math.round(bgG / corners.length);
      bgB = Math.round(bgB / corners.length);

      setProgress(55, 'Removing background…');

      // ── Flood-fill from edges using a tolerance-based approach ────────────
      var tolerance = 35; // colour distance threshold
      var visited   = new Uint8Array(w * h); // 0=unvisited, 1=bg, 2=fg
      var queue     = [];

      function colorDist(i) {
        var dr = px[i]   - bgR;
        var dg = px[i+1] - bgG;
        var db = px[i+2] - bgB;
        return Math.sqrt(dr*dr + dg*dg + db*db);
      }

      // Seed all edge pixels that match background
      function seedEdge(x, y) {
        var idx = y * w + x;
        if (!visited[idx] && colorDist(idx * 4) <= tolerance) {
          visited[idx] = 1;
          queue.push(idx);
        }
      }
      for (var x = 0; x < w; x++) { seedEdge(x, 0); seedEdge(x, h-1); }
      for (var y = 1; y < h-1; y++) { seedEdge(0, y); seedEdge(w-1, y); }

      // BFS flood-fill
      var neighbours = [-1, 1, -w, w];
      var qi = 0;
      while (qi < queue.length) {
        var cur = queue[qi++];
        for (var n = 0; n < 4; n++) {
          var nb = cur + neighbours[n];
          if (nb < 0 || nb >= w * h) continue;
          // Don't cross row boundaries for left/right neighbours
          if (neighbours[n] === -1 && cur % w === 0) continue;
          if (neighbours[n] ===  1 && nb  % w === 0) continue;
          if (!visited[nb] && colorDist(nb * 4) <= tolerance) {
            visited[nb] = 1;
            queue.push(nb);
          }
        }
      }

      setProgress(80, 'Compositing…');

      // ── Write output ──────────────────────────────────────────────────────
      var out = document.createElement('canvas');
      out.width = w; out.height = h;
      var oCtx = out.getContext('2d');
      var outData = oCtx.createImageData(w, h);
      var od = outData.data;

      for (var p = 0; p < w * h; p++) {
        var pi = p * 4;
        od[pi]   = px[pi];
        od[pi+1] = px[pi+1];
        od[pi+2] = px[pi+2];
        // Background pixels → transparent; foreground → opaque
        od[pi+3] = visited[p] === 1 ? 0 : 255;
      }
      oCtx.putImageData(outData, 0, 0);

      setProgress(100, '✅ Done!');

      // Show result
      outCanvas.width  = w;
      outCanvas.height = h;
      var rCtx = outCanvas.getContext('2d');
      rCtx.clearRect(0, 0, w, h);
      rCtx.drawImage(out, 0, 0);

      dlBtn.onclick = function() {
        var a = document.createElement('a');
        a.download = (currentFile.name.replace(/\.[^.]+$/, '') || 'image') + '_nobg.png';
        a.href = outCanvas.toDataURL('image/png');
        a.click();
      };

      resultBox.style.display = 'block';
      resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    } catch(err) {
      showError(err.message || 'Something went wrong.');
    } finally {
      goBtn.disabled    = false;
      goBtn.textContent = '✨ Remove Background';
    }
  }

  function setProgress(pct, msg) {
    progBar.style.width   = pct + '%';
    statusMsg.textContent = msg;
  }

  function showError(msg) {
    progBar.style.width   = '0%';
    statusMsg.textContent = '';
    errMsg.textContent    = '❌ ' + msg;
    errMsg.style.display  = 'block';
    goBtn.disabled        = false;
    goBtn.textContent     = '✨ Remove Background';
  }

})();
</script>
</body>
</html>
