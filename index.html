<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BG Remover</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d12;color:#e2e2e8;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem 4rem}
    h1{font-size:2rem;font-weight:700;text-align:center;margin-bottom:.3rem}
    h1 span{color:#7c6af7}
    .sub{color:#777;font-size:.9rem;text-align:center;margin-bottom:.6rem}
    .badge{display:inline-block;background:#1a1a2e;border:1px solid #3a2f5a;border-radius:999px;
      padding:.22rem .85rem;font-size:.73rem;color:#a89fff;margin-bottom:2rem}
    .card{width:100%;max-width:560px;background:#15151e;border:1px solid #2a2a3a;
      border-radius:18px;padding:1.75rem}
    .upload-area{display:block;border:2px dashed #333;border-radius:12px;padding:2.5rem 1rem;
      text-align:center;cursor:pointer;transition:border-color .15s,background .15s;
      background:#0d0d12;user-select:none}
    .upload-area:hover,.upload-area.over{border-color:#7c6af7;background:#0e0c1c}
    .upload-area .icon{font-size:2rem;display:block;margin-bottom:.6rem}
    .upload-area strong{display:block;font-size:.92rem;color:#d0d0e0;margin-bottom:.25rem}
    .upload-area small{font-size:.76rem;color:#666}
    #pick{position:absolute;left:-9999px;opacity:0}
    .or{display:flex;align-items:center;gap:8px;margin:.9rem 0}
    .or hr{flex:1;border:none;border-top:1px solid #222}
    .or span{font-size:.72rem;color:#444}
    .btn-pick{display:block;width:100%;padding:.7rem;background:#1c1c28;color:#bbb;
      border:1px solid #2a2a3a;border-radius:10px;font-size:.88rem;cursor:pointer;
      text-align:center;transition:background .15s,border-color .15s;user-select:none}
    .btn-pick:hover{background:#22223a;border-color:#7c6af7;color:#fff}
    #fileRow{display:none;align-items:center;gap:10px;background:#1c1c28;
      border:1px solid #2a2a3a;border-radius:10px;padding:.6rem 1rem;margin-top:.85rem}
    #fileRow .name{flex:1;font-size:.82rem;color:#d0d0e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #fileRow .size{font-size:.72rem;color:#666;flex-shrink:0}
    #clearBtn{background:none;border:none;color:#555;font-size:15px;cursor:pointer;padding:4px}
    #clearBtn:hover{color:#e07070}
    #goBtn{display:none;width:100%;padding:.78rem;background:#2d9e6b;color:#fff;
      border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;
      margin-top:.85rem;transition:background .15s}
    #goBtn:hover{background:#1f7a50}
    #goBtn:disabled{background:#1a5a3e;color:#556;cursor:not-allowed}
    #progWrap{display:none;background:#0d0d12;border-radius:6px;height:7px;overflow:hidden;margin-top:.85rem}
    #progBar{height:100%;width:0%;background:#7c6af7;transition:width .3s}
    #statusMsg{margin-top:.65rem;font-size:.8rem;color:#9d8fff;text-align:center;min-height:1.1rem}
    #errMsg{display:none;background:#1f0f14;border:1px solid #6b2030;border-radius:10px;
      padding:.7rem 1rem;margin-top:.85rem;font-size:.8rem;color:#e08090;line-height:1.6}
    .pills{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:1.1rem}
    .pill{font-size:.67rem;padding:2px 9px;border-radius:999px;border:1px solid #2a2a3a;
      color:#444;background:#0d0d14}
    #resultBox{display:none;margin-top:1.5rem;width:100%;max-width:560px;
      background:#15151e;border:1px solid #2a2a3a;border-radius:18px;padding:1.25rem;text-align:center}
    #resultLabel{font-size:.8rem;color:#666;margin-bottom:.75rem}
    #outCanvas{max-width:100%;border-radius:10px;border:1px solid #2a2a3a;
      background:repeating-conic-gradient(#1c1c1c 0% 25%,#111 0% 50%) 0 0/14px 14px}
    #dlBtn{display:inline-block;margin-top:.85rem;padding:.58rem 1.8rem;
      background:#2d9e6b;color:#fff;border:none;border-radius:8px;
      font-size:.88rem;font-weight:700;cursor:pointer;transition:background .15s}
    #dlBtn:hover{background:#1f7a50}
    footer{margin-top:2.5rem;font-size:.72rem;color:#444;text-align:center;line-height:1.8}
    footer a{color:#444}
  </style>
</head>
<body>

<h1>&#127924; BG <span>Remover</span></h1>
<p class="sub">Remove image backgrounds — free, no sign-up, runs in your browser</p>
<span class="badge">&#10003; Free &nbsp; &#10003; No sign-up &nbsp; &#10003; Auto-detect &nbsp; &#10003; Private</span>

<div class="card">
  <input type="file" id="pick" accept="image/png,image/jpeg,image/webp,image/bmp">
  <label class="upload-area" for="pick" id="dropArea">
    <span class="icon">&#128247;</span>
    <strong>Drop image here or click to browse</strong>
    <small>PNG &bull; JPG &bull; WEBP &bull; BMP &bull; Works best on solid/plain backgrounds</small>
  </label>
  <div class="or"><hr><span>or</span><hr></div>
  <label class="btn-pick" for="pick">&#128193; Choose image file</label>
  <div id="fileRow">
    <span style="font-size:18px">&#128444;</span>
    <span class="name" id="fileName"></span>
    <span class="size" id="fileSize"></span>
    <button id="clearBtn" type="button">&#10005;</button>
  </div>
  <button id="goBtn" type="button">&#10024; Remove Background</button>
  <div id="progWrap"><div id="progBar"></div></div>
  <p id="statusMsg"></p>
  <div id="errMsg"></div>
  <div class="pills">
    <span class="pill">K-means auto</span>
    <span class="pill">Soft edges</span>
    <span class="pill">No upload</span>
    <span class="pill">100% private</span>
  </div>
</div>

<div id="resultBox">
  <div id="resultLabel">&#9989; Done!</div>
  <canvas id="outCanvas"></canvas><br>
  <button id="dlBtn" type="button">&#8659; Download PNG</button>
</div>

<footer>
  Runs entirely in your browser &mdash; images never leave your device &bull;
  <a href="https://github.com/HP980322/bg-remover" target="_blank">GitHub</a>
</footer>

<script>
(function(){
'use strict';

/* ─────────────────────────────────────────────────────────────────────────────
   BG Remover v6 — Frozen best algorithm
   Pipeline:
     1. K-means (k=12) on all edge pixels to model the background palette
     2. Per-cluster adaptive tolerance (mean_dist + 2.5*std + 12, clamped 22-62)
     3. BFS flood-fill from every border pixel
     4. Connected-component analysis: keep the largest fg blob + any other blobs
        that are > 1% of the largest (to preserve detached limbs)
     5. Soft alpha transition zone at boundaries
     6. 3x3 box-blur feathering on the alpha channel
─────────────────────────────────────────────────────────────────────────────*/

var pick=document.getElementById('pick'), dropArea=document.getElementById('dropArea'),
    fileRow=document.getElementById('fileRow'), fileName=document.getElementById('fileName'),
    fileSize=document.getElementById('fileSize'), clearBtn=document.getElementById('clearBtn'),
    goBtn=document.getElementById('goBtn'), progWrap=document.getElementById('progWrap'),
    progBar=document.getElementById('progBar'), statusMsg=document.getElementById('statusMsg'),
    errMsg=document.getElementById('errMsg'), resultBox=document.getElementById('resultBox'),
    resultLabel=document.getElementById('resultLabel'), outCanvas=document.getElementById('outCanvas'),
    dlBtn=document.getElementById('dlBtn');

var cf=null;

pick.addEventListener('change',function(){ if(pick.files&&pick.files[0]) setFile(pick.files[0]); });
dropArea.addEventListener('dragover',function(e){e.preventDefault();dropArea.classList.add('over');});
dropArea.addEventListener('dragleave',function(){dropArea.classList.remove('over');});
dropArea.addEventListener('drop',function(e){
  e.preventDefault();dropArea.classList.remove('over');
  var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];if(f)setFile(f);
});
function setFile(f){
  cf=f; fileName.textContent=f.name; fileSize.textContent=(f.size/1048576).toFixed(2)+' MB';
  fileRow.style.display='flex'; goBtn.style.display='block';
  resultBox.style.display='none'; errMsg.style.display='none';
  statusMsg.textContent=''; progBar.style.width='0%'; progWrap.style.display='none';
}
clearBtn.addEventListener('click',function(){
  cf=null;pick.value='';fileRow.style.display='none';goBtn.style.display='none';
  resultBox.style.display='none';errMsg.style.display='none';statusMsg.textContent='';
});

goBtn.addEventListener('click',function(){
  if(!cf)return;
  goBtn.disabled=true;goBtn.textContent='Processing…';
  errMsg.style.display='none';resultBox.style.display='none';
  progWrap.style.display='block';prog(5,'Reading image…');
  var r=new FileReader();
  r.onerror=function(){showErr('Could not read file.');};
  r.onload=function(ev){
    var img=new Image();
    img.onerror=function(){showErr('Could not decode image.');};
    img.onload=function(){prog(12,'Image loaded…');setTimeout(function(){run(img);},20);};
    img.src=ev.target.result;
  };
  r.readAsDataURL(cf);
});

function run(img){
  try{
    var w=img.naturalWidth,h=img.naturalHeight;
    var sc=document.createElement('canvas');sc.width=w;sc.height=h;
    var ctx=sc.getContext('2d');ctx.drawImage(img,0,0);
    var id=ctx.getImageData(0,0,w,h),px=id.data;

    prog(20,'Sampling edge colours…');

    /* ── 1. Edge pixel collection (sample every 2nd pixel for speed) ── */
    var ec=[];
    for(var x=0;x<w;x+=2){ec.push(gc(x,0));ec.push(gc(x,h-1));}
    for(var y=1;y<h-1;y+=2){ec.push(gc(0,y));ec.push(gc(w-1,y));}
    function gc(x,y){var i=(y*w+x)*4;return[px[i],px[i+1],px[i+2]];}

    prog(28,'Building colour model…');

    /* ── 2. K-means k=12, 20 iterations ── */
    var K=12,N=ec.length;
    var cents=[];
    for(var ki=0;ki<K;ki++) cents.push(ec[Math.floor(ki*N/K)].slice());
    for(var it=0;it<20;it++){
      var sums=[],cnts=[];
      for(var ci=0;ci<K;ci++){sums.push([0,0,0]);cnts.push(0);}
      for(var ei=0;ei<N;ei++){
        var c=ec[ei],bk=0,bd=cd3(c,cents[0]);
        for(var cj=1;cj<K;cj++){var dd=cd3(c,cents[cj]);if(dd<bd){bd=dd;bk=cj;}}
        sums[bk][0]+=c[0];sums[bk][1]+=c[1];sums[bk][2]+=c[2];cnts[bk]++;
      }
      for(var ck=0;ck<K;ck++) if(cnts[ck]>0) cents[ck]=[sums[ck][0]/cnts[ck],sums[ck][1]/cnts[ck],sums[ck][2]/cnts[ck]];
    }

    /* ── 3. Per-cluster adaptive tolerance ── */
    var cDists=[],cCnts=new Array(K).fill(0);
    for(var i2=0;i2<K;i2++) cDists.push([]);
    for(var ei3=0;ei3<N;ei3++){
      var c3=ec[ei3],bk3=0,bd3=cd3(c3,cents[0]);
      for(var cj3=1;cj3<K;cj3++){var dd3=cd3(c3,cents[cj3]);if(dd3<bd3){bd3=dd3;bk3=cj3;}}
      cDists[bk3].push(bd3);cCnts[bk3]++;
    }
    var tols=cents.map(function(_,ci){
      var arr=cDists[ci];if(!arr.length)return 26;
      var mean=arr.reduce(function(s,v){return s+v;},0)/arr.length;
      var variance=arr.reduce(function(s,v){return s+(v-mean)*(v-mean);},0)/arr.length;
      var std=Math.sqrt(variance);
      return Math.max(22,Math.min(62,mean+2.5*std+12));
    });

    prog(40,'Flood-filling background…');

    /* ── 4. Per-pixel: distance to nearest centroid ── */
    var WH=w*h;
    var nd=new Float32Array(WH),tp=new Float32Array(WH),ni=new Uint8Array(WH);
    for(var p=0;p<WH;p++){
      var pi=p*4,r=px[pi],g=px[pi+1],b=px[pi+2];
      var bst=0,bstd=Infinity;
      for(var ci4=0;ci4<K;ci4++){
        var dr=r-cents[ci4][0],dg=g-cents[ci4][1],db=b-cents[ci4][2];
        var dd4=Math.sqrt(dr*dr+dg*dg+db*db);
        if(dd4<bstd){bstd=dd4;bst=ci4;}
      }
      nd[p]=bstd;ni[p]=bst;tp[p]=tols[bst];
    }

    /* ── 5. BFS from border ── */
    var alpha=new Float32Array(WH);
    for(var i=0;i<WH;i++) alpha[i]=1;
    var vis=new Uint8Array(WH),q=[];
    function seed(idx){if(!vis[idx]&&nd[idx]<=tp[idx]){vis[idx]=1;alpha[idx]=0;q.push(idx);}}
    for(var x2=0;x2<w;x2++){seed(x2);seed((h-1)*w+x2);}
    for(var y2=1;y2<h-1;y2++){seed(y2*w);seed(y2*w+w-1);}
    var dirs=[-1,1,-w,w],qi=0;
    while(qi<q.length){
      var cur=q[qi++];
      for(var d=0;d<4;d++){
        var nb=cur+dirs[d];
        if(nb<0||nb>=WH)continue;
        if(dirs[d]===-1&&cur%w===0)continue;
        if(dirs[d]===1&&nb%w===0)continue;
        if(!vis[nb]&&nd[nb]<=tp[nb]){vis[nb]=1;alpha[nb]=0;q.push(nb);}
      }
    }

    prog(62,'Analysing components…');

    /* ── 6. Connected components — keep largest + blobs > 1% of largest ── */
    // Simple BFS labelling (4-connected)
    var lab=new Int32Array(WH);var numLab=0;
    var szMap={};
    for(var sp=0;sp<WH;sp++){
      if(alpha[sp]===1&&!lab[sp]){
        numLab++;var lbl=numLab;
        var bfsQ=[sp];var bfsI=0;var sz=0;
        lab[sp]=lbl;
        while(bfsI<bfsQ.length){
          var bc=bfsQ[bfsI++];sz++;
          for(var dd2=0;dd2<4;dd2++){
            var bnb=bc+dirs[dd2];
            if(bnb<0||bnb>=WH)continue;
            if(dirs[dd2]===-1&&bc%w===0)continue;
            if(dirs[dd2]===1&&bnb%w===0)continue;
            if(alpha[bnb]===1&&!lab[bnb]){lab[bnb]=lbl;bfsQ.push(bnb);}
          }
        }
        szMap[lbl]=sz;
      }
    }
    // Find max size
    var maxSz=0;
    for(var lk in szMap) if(szMap[lk]>maxSz) maxSz=szMap[lk];
    var minKeep=maxSz*0.01;
    // Remove small components
    for(var kp=0;kp<WH;kp++){
      if(alpha[kp]===1&&lab[kp]&&szMap[lab[kp]]<minKeep) alpha[kp]=0;
    }

    prog(75,'Smoothing edges…');

    /* ── 7. Soft alpha transition ── */
    for(var sp2=0;sp2<WH;sp2++){
      if(alpha[sp2]===1){
        var soft=tp[sp2]*0.15;
        if(nd[sp2]<tp[sp2]-soft){alpha[sp2]=0;}
        else if(nd[sp2]<tp[sp2]+soft){
          var denom=soft*2;if(denom<0.001)denom=0.001;
          alpha[sp2]=(nd[sp2]-(tp[sp2]-soft))/denom;
          if(alpha[sp2]<0)alpha[sp2]=0;if(alpha[sp2]>1)alpha[sp2]=1;
        }
      }
    }

    /* ── 8. 3x3 box-blur feather ── */
    var aB=new Float32Array(alpha);
    for(var fy=1;fy<h-1;fy++){
      for(var fx=1;fx<w-1;fx++){
        var fi=fy*w+fx,sum=0;
        for(var dy=-1;dy<=1;dy++) for(var dx=-1;dx<=1;dx++) sum+=alpha[(fy+dy)*w+(fx+dx)];
        aB[fi]=sum/9;
      }
    }

    prog(92,'Compositing…');

    /* ── 9. Write output ── */
    var oc=document.createElement('canvas');oc.width=w;oc.height=h;
    var octx=oc.getContext('2d');var oid=octx.createImageData(w,h);var od=oid.data;
    for(var op=0;op<WH;op++){
      var opi=op*4;
      od[opi]=px[opi];od[opi+1]=px[opi+1];od[opi+2]=px[opi+2];
      od[opi+3]=Math.min(255,Math.round(aB[op]*255));
    }
    octx.putImageData(oid,0,0);
    prog(100,'✅ Done!');

    outCanvas.width=w;outCanvas.height=h;
    var rctx=outCanvas.getContext('2d');rctx.clearRect(0,0,w,h);rctx.drawImage(oc,0,0);
    resultLabel.textContent='✅ Background removed.';
    dlBtn.onclick=function(){
      var a=document.createElement('a');
      a.download=(cf.name.replace(/\.[^.]+$/,'')||'image')+'_nobg.png';
      a.href=outCanvas.toDataURL('image/png');a.click();
    };
    resultBox.style.display='block';
    resultBox.scrollIntoView({behavior:'smooth',block:'nearest'});

  }catch(err){showErr(err.message||'Something went wrong.');}
  finally{goBtn.disabled=false;goBtn.textContent='✨ Remove Background';}
}

function cd3(a,b){var dr=a[0]-b[0],dg=a[1]-b[1],db=a[2]-b[2];return Math.sqrt(dr*dr+dg*dg+db*db);}
function prog(pct,msg){progBar.style.width=pct+'%';statusMsg.textContent=msg;}
function showErr(msg){prog(0,'');errMsg.textContent='❌ '+msg;errMsg.style.display='block';goBtn.disabled=false;goBtn.textContent='✨ Remove Background';}

})();
</script>
</body>
</html>
